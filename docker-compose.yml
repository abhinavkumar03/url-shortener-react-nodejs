version: "3.9"

services:
  client:
    build:
      context: ./client
    container_name: url-shortener-client
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - /app/node_modules
    stdin_open: true
    tty: true

  server:
    build:
      context: ./server
    container_name: url-shortener-server
    ports:
      - "5000:5000"
    volumes:
      - ./server:/app
      - /app/node_modules
